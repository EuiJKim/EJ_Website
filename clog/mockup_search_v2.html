<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375" />
  <title>검색 v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 375px;
      height: 812px;
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      background: white;
      overflow: hidden;
    }

    /* 상태바 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #1A1A2E;
    }
    .status-right {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 11px;
    }

    /* 검색바 */
    .search-bar {
      margin: 8px 20px 0;
      display: flex;
      align-items: center;
      background: #F5F5F5;
      border-radius: 12px;
      padding: 12px 16px;
      gap: 10px;
    }
    .search-icon { font-size: 16px; color: #888; }
    .search-text {
      font-size: 15px;
      color: #1A1A2E;
      font-weight: 400;
    }
    .search-clear {
      margin-left: auto;
      font-size: 16px;
      color: #C0C0C0;
    }

    /* 컨텐츠 영역 */
    .content {
      padding: 24px 20px;
      height: calc(812px - 60px - 52px - 260px);
      overflow-y: auto;
    }

    /* 섹션 레이블 */
    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #C0C0C0;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    /* 최근 검색 */
    .recent-item {
      display: flex;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid #F5F5F5;
      gap: 12px;
    }
    .recent-icon {
      font-size: 14px;
      color: #C0C0C0;
    }
    .recent-name {
      font-size: 15px;
      color: #1A1A2E;
      font-weight: 400;
      flex: 1;
    }
    .recent-delete {
      font-size: 14px;
      color: #D0D0D0;
    }

    /* 인기 암장 */
    .popular-section {
      margin-top: 28px;
    }
    .popular-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .popular-card {
      background: white;
      border: 1.5px solid #E8E8E8;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .popular-card:first-child {
      border-color: #1E41C0;
      background: #F5F7FF;
    }
    .pc-distance {
      font-size: 11px;
      font-weight: 600;
      color: #1E41C0;
    }
    .pc-name {
      font-size: 15px;
      font-weight: 700;
      color: #1A1A2E;
      line-height: 1.3;
    }
    .pc-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #888;
    }
    .pc-star { color: #F59E0B; font-size: 12px; }
    .pc-rating { font-weight: 600; color: #1A1A2E; }
    .pc-reviews { color: #C0C0C0; }

    /* 키보드 */
    .keyboard {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 260px;
      background: #D1D5DB;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 4px;
    }
    .kb-row {
      display: flex;
      gap: 5px;
    }
    .kb-key {
      width: 32px;
      height: 40px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 400;
      color: #1A1A2E;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .kb-key.wide { width: 42px; font-size: 13px; }
    .kb-key.space { width: 160px; font-size: 13px; color: #888; }
    .kb-key.action { background: #1E41C0; color: white; width: 56px; font-size: 14px; font-weight: 600; }
    .kb-key.gray { background: #ABB2BF; color: #1A1A2E; }
    .kb-bottom {
      display: flex;
      gap: 5px;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <span>9:41 AM</span>
    <span class="status-right">📶 100% 🔋</span>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <span class="search-text">마운틴</span>
    <span class="search-clear">✕</span>
  </div>

  <div class="content">
    <p class="section-label">최근 검색</p>
    <div class="recent-item">
      <span class="recent-icon">🕐</span>
      <span class="recent-name">마운틴스타 클라이밍짐</span>
      <span class="recent-delete">✕</span>
    </div>
    <div class="recent-item">
      <span class="recent-icon">🕐</span>
      <span class="recent-name">스마트 클라이밍</span>
      <span class="recent-delete">✕</span>
    </div>

    <div class="popular-section">
      <p class="section-label">내 주변 인기</p>
      <div class="popular-grid">
        <div class="popular-card">
          <span class="pc-distance">📍 0.8km</span>
          <span class="pc-name">마운틴스타<br>클라이밍짐</span>
          <div class="pc-meta">
            <span class="pc-star">★</span>
            <span class="pc-rating">4.5</span>
            <span class="pc-reviews">· 리뷰 32</span>
          </div>
        </div>
        <div class="popular-card">
          <span class="pc-distance">📍 1.2km</span>
          <span class="pc-name">클로그<br>클라이밍</span>
          <div class="pc-meta">
            <span class="pc-star">★</span>
            <span class="pc-rating">4.2</span>
            <span class="pc-reviews">· 리뷰 18</span>
          </div>
        </div>
        <div class="popular-card">
          <span class="pc-distance">📍 1.5km</span>
          <span class="pc-name">더클라임<br>강남점</span>
          <div class="pc-meta">
            <span class="pc-star">★</span>
            <span class="pc-rating">4.8</span>
            <span class="pc-reviews">· 리뷰 45</span>
          </div>
        </div>
        <div class="popular-card">
          <span class="pc-distance">📍 2.1km</span>
          <span class="pc-name">피커스<br>볼더링짐</span>
          <div class="pc-meta">
            <span class="pc-star">★</span>
            <span class="pc-rating">4.0</span>
            <span class="pc-reviews">· 리뷰 12</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="keyboard">
    <div class="kb-row">
      <div class="kb-key">ㅂ</div>
      <div class="kb-key">ㅈ</div>
      <div class="kb-key">ㄷ</div>
      <div class="kb-key">ㄱ</div>
      <div class="kb-key">ㅅ</div>
      <div class="kb-key">ㅛ</div>
      <div class="kb-key">ㅕ</div>
      <div class="kb-key">ㅑ</div>
      <div class="kb-key">ㅐ</div>
      <div class="kb-key">ㅔ</div>
    </div>
    <div class="kb-row">
      <div class="kb-key">ㅁ</div>
      <div class="kb-key">ㄴ</div>
      <div class="kb-key">ㅇ</div>
      <div class="kb-key">ㄹ</div>
      <div class="kb-key">ㅎ</div>
      <div class="kb-key">ㅗ</div>
      <div class="kb-key">ㅓ</div>
      <div class="kb-key">ㅏ</div>
      <div class="kb-key">ㅣ</div>
    </div>
    <div class="kb-row">
      <div class="kb-key gray wide">⇧</div>
      <div class="kb-key">ㅋ</div>
      <div class="kb-key">ㅌ</div>
      <div class="kb-key">ㅊ</div>
      <div class="kb-key">ㅍ</div>
      <div class="kb-key">ㅠ</div>
      <div class="kb-key">ㅜ</div>
      <div class="kb-key">ㅡ</div>
      <div class="kb-key gray wide">⌫</div>
    </div>
    <div class="kb-bottom">
      <div class="kb-key gray" style="width:36px; font-size:13px;">123</div>
      <div class="kb-key gray" style="width:36px; font-size:16px;">😊</div>
      <div class="kb-key space">간격</div>
      <div class="kb-key action">검색</div>
    </div>
  </div>
</body>
</html>
