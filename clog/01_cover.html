<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>Clog – 1장 커버</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="stylesheet" href="design-system.css" />
  <style>
    body { background: #F0F2FF; display: flex; font-family: 'Freesentation', sans-serif; }

    /* 배경: 미묘한 도트 패턴 */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(30,65,192,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* 좌측 텍스트 */
    .left {
      width: 42%;
      padding: 52px 0 52px 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .category-tag {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 28px;
    }
    .tag { font-size: 11px; font-weight: 400; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
    .tag-dot { width: 3px; height: 3px; border-radius: 50%; background: #C0C0C0; }

    .app-logo { display: flex; align-items: baseline; gap: 10px; margin-bottom: 28px; }
    .app-name { font-size: 56px; font-weight: 900; color: var(--blue); letter-spacing: -0.02em; }
    .app-sub { font-size: 18px; font-weight: 400; color: var(--gray-500); letter-spacing: 0.06em; }

    .headline { font-size: 48px; font-weight: 900; color: var(--dark); line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 22px; }
    .headline .quote { color: var(--blue); }

    .subtext { font-size: 20px; font-weight: 300; color: var(--gray-500); line-height: 1.75; margin-bottom: 52px; }

    .meta { display: flex; flex-direction: column; gap: 13px; }
    .meta-row { display: flex; gap: 20px; align-items: center; }
    .meta-label { font-size: 13px; font-weight: 700; color: var(--gray-300); letter-spacing: 0.06em; width: 64px; }
    .meta-value { font-size: 16px; font-weight: 300; color: var(--gray-700); }

    /* 우측 폰 목업 */
    .right {
      width: 58%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .phones { position: relative; width: 820px; height: 900px; }

    .phone {
      position: absolute;
      border-radius: 24px;
      overflow: hidden;
      background: #fff;
    }
    .phone img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }

    .phone-left  { width: 300px; height: 534px; left: 0;    bottom: 80px; transform: rotate(-5deg); z-index: 1; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
    .phone-center{ width: 370px; height: 658px; left: 220px; bottom: 60px; z-index: 3;              box-shadow: 0 40px 100px rgba(30,65,192,0.28); }
    .phone-right { width: 300px; height: 534px; left: 510px; bottom: 80px; transform: rotate(5deg);  z-index: 1; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }

    .badge {
      position: absolute;
      bottom: 40px; right: 20px;
      background: white;
      border-radius: 18px;
      padding: 16px 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .badge .b-label { font-size: 13px; color: var(--gray-500); }
    .badge .b-value { font-size: 32px; font-weight: 900; color: var(--blue); }
  </style>
</head>
<body>
  <div class="left">
    <div class="category-tag">
      <span class="tag">B2C Service</span>
      <span class="tag-dot"></span>
      <span class="tag">UX / UI Design</span>
    </div>
    <div class="app-logo">
      <span class="app-name">Clog</span>
      <span class="app-sub">Climbing Log</span>
    </div>
    <h1 class="headline">
      <span class="quote">"</span>열심히 다니는데,<br>
      실력이 늘고 있는 건지<br>모르겠어요<span class="quote">"</span>
    </h1>
    <p class="subtext">
      방문 기록부터 컨디션·부상까지,<br>한 곳에 남깁니다
    </p>
    <div class="c-divider"></div>
    <div class="meta">
      <div class="meta-row">
        <span class="meta-label">역할</span>
        <span class="meta-value">서비스 기획 · UI 디자인</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">기여도</span>
        <span class="meta-value">1인 100%</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">기간</span>
        <span class="meta-value">2020.10 – 2020.11</span>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="phones">
      <div class="phone phone-left">
        <img src="img_splash.png" alt="스플래시" />
      </div>
      <div class="phone phone-center">
        <img src="img_calendar.jpg" alt="캘린더" />
      </div>
      <div class="phone phone-right">
        <img src="img_main.jpg" alt="메인 지도" />
      </div>
    </div>
  </div>
</body>
</html>
