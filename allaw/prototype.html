<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALLAW Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 375px;
    height: 667px;
    background: #fff;
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    padding: 12px 20px 8px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: #111;
  }

  /* App header */
  .app-header {
    padding: 8px 20px 12px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .app-logo {
    width: 32px; height: 32px;
    background: #1E41C0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .app-name {
    font-size: 16px;
    font-weight: 600;
    color: #111;
  }
  .app-subtitle {
    font-size: 11px;
    color: #999;
    font-weight: 400;
  }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(8px);
    animation: msgIn 0.3s ease forwards;
  }
  .msg.user {
    align-self: flex-end;
    background: #1E41C0;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    align-self: flex-start;
    background: #f0f0f0;
    color: #111;
    border-bottom-left-radius: 4px;
  }
  .msg.ai .label {
    font-size: 11px;
    font-weight: 600;
    color: #1E41C0;
    margin-bottom: 4px;
  }

  @keyframes msgIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    align-self: flex-start;
    background: #f0f0f0;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: #999;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }

  /* Suggestion chips */
  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 4px 0;
    opacity: 0;
    animation: msgIn 0.3s ease forwards;
  }
  .chip {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #ddd;
    font-size: 13px;
    color: #1E41C0;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: #fff;
  }
  .chip:hover {
    background: #eef1ff;
    border-color: #1E41C0;
  }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .input-field {
    flex: 1;
    padding: 10px 16px;
    border-radius: 24px;
    border: 1px solid #ddd;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-field:focus { border-color: #1E41C0; }
  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: #1E41C0;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .send-btn:hover { background: #1633a0; }
  .send-btn:disabled { background: #ccc; cursor: default; }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    gap: 16px;
  }
  .welcome-icon {
    width: 56px; height: 56px;
    background: #eef1ff;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .welcome h2 {
    font-size: 18px;
    font-weight: 600;
    color: #111;
  }
  .welcome p {
    font-size: 14px;
    color: #777;
    line-height: 1.6;
  }

  /* Reset button */
  .reset-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: #999;
    cursor: pointer;
    font-family: inherit;
    z-index: 10;
  }
  .reset-btn:hover { color: #111; border-color: #111; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="phone" id="app">
  <button class="reset-btn" onclick="resetChat()">Reset</button>

  <div class="status-bar">
    <span>9:41</span>
    <span>●●● WiFi 🔋</span>
  </div>

  <div class="app-header">
    <div class="app-logo">AL</div>
    <div>
      <div class="app-name">ALLAW</div>
      <div class="app-subtitle">AI 법률 상담</div>
    </div>
  </div>

  <!-- Welcome -->
  <div class="welcome" id="welcome">
    <div class="welcome-icon">⚖</div>
    <h2>법률 고민이 있으신가요?</h2>
    <p>궁금한 법률 문제를 편하게 물어보세요.<br>AI가 쉬운 말로 답변해 드립니다.</p>
    <div class="chips" style="opacity:1; justify-content:center; margin-top:8px;">
      <span class="chip" onclick="startScenario(0)">이혼 재산분할</span>
      <span class="chip" onclick="startScenario(1)">전세금 미반환</span>
      <span class="chip" onclick="startScenario(2)">직장 내 부당해고</span>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat hidden" id="chat"></div>

  <!-- Input -->
  <div class="input-area">
    <input class="input-field" id="input" placeholder="법률 질문을 입력하세요..." disabled />
    <button class="send-btn" id="sendBtn" disabled>↑</button>
  </div>
</div>

<script>
const scenarios = [
  {
    question: "이혼할 때 재산분할은 어떻게 되나요?",
    answer: "혼인 중 부부가 함께 모은 재산은 <strong>공동 재산</strong>으로 보고, 보통 <strong>50:50</strong>으로 나눕니다.\n\n다만 아래 상황에 따라 비율이 달라질 수 있어요:\n\n• 혼인 기간이 길수록 균등 분할 가능성 ↑\n• 가사 노동도 재산 형성 기여로 인정\n• 혼인 전 개인 재산은 분할 대상 아님\n\n💡 <strong>Tip:</strong> 부동산·예금·퇴직금·보험 모두 포함됩니다.",
    followUps: ["위자료도 받을 수 있나요?", "양육권은 어떻게 정해지나요?", "변호사 상담이 필요할까요?"]
  },
  {
    question: "전세 만기인데 집주인이 보증금을 안 돌려줘요",
    answer: "전세 보증금 미반환 시 아래 순서로 진행하세요:\n\n<strong>1단계:</strong> 내용증명 발송 (반환 요구 공식 기록)\n<strong>2단계:</strong> 임차권등기명령 신청 (이사 후에도 대항력 유지)\n<strong>3단계:</strong> 지급명령 신청 (법원, 수수료 약 5만원)\n\n💡 <strong>Tip:</strong> HUG 전세보증보험에 가입되어 있다면 보험사가 대신 지급 후 집주인에게 구상권을 행사합니다.",
    followUps: ["내용증명은 어떻게 보내나요?", "임차권등기명령 신청 방법은?", "소송 비용은 얼마나 드나요?"]
  },
  {
    question: "회사에서 갑자기 해고 통보를 받았어요",
    answer: "부당해고에 해당할 수 있습니다. 확인해볼 점:\n\n• <strong>해고 예고:</strong> 30일 전 통보 또는 30일분 통상임금 지급 의무\n• <strong>서면 통지:</strong> 해고 사유와 시기가 서면으로 전달되어야 유효\n• <strong>정당한 사유:</strong> 업무 능력 부족만으로는 해고 사유 불충분\n\n📋 <strong>구제 절차:</strong>\n해고일로부터 <strong>3개월 이내</strong>에 노동위원회에 부당해고 구제신청 가능 (무료).",
    followUps: ["구제신청은 어떻게 하나요?", "실업급여 받을 수 있나요?", "해고 예고수당 계산법은?"]
  }
];

let currentStep = 0;

function startScenario(idx) {
  const s = scenarios[idx];
  document.getElementById('welcome').classList.add('hidden');
  const chat = document.getElementById('chat');
  chat.classList.remove('hidden');
  chat.innerHTML = '';
  currentStep = 0;

  // User message
  addMsg('user', s.question);

  // Typing then AI answer
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMsg('ai', s.answer, 'AI 법률 도우미');
      // Follow-up chips
      setTimeout(() => {
        addChips(s.followUps, idx);
      }, 300);
    }, 1500);
  }, 600);
}

function addMsg(type, text, label) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (label) {
    div.innerHTML = `<div class="label">${label}</div>${text.replace(/\n/g, '<br>')}`;
  } else {
    div.innerHTML = text.replace(/\n/g, '<br>');
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function addChips(items, scenarioIdx) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'chips';
  items.forEach(text => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = text;
    chip.onclick = () => handleFollowUp(text);
    div.appendChild(chip);
  });
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function handleFollowUp(question) {
  // Remove chips
  document.querySelectorAll('.chips').forEach(c => c.remove());

  addMsg('user', question);

  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMsg('ai', '이 부분은 구체적인 상황에 따라 달라질 수 있어요. ALLAW에서는 <strong>사용자의 상황을 단계별로 파악</strong>하여 맞춤형 답변을 제공합니다.\n\n실제 앱에서는 추가 질문을 통해 더 정확한 법률 조언을 받으실 수 있습니다.', 'AI 법률 도우미');
    }, 1200);
  }, 500);
}

function resetChat() {
  document.getElementById('welcome').classList.remove('hidden');
  const chat = document.getElementById('chat');
  chat.classList.add('hidden');
  chat.innerHTML = '';
}
</script>
</body>
</html>
