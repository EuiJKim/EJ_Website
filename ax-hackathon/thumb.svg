<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Mono','Consolas',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1024"/>
      <stop offset="1" stop-color="#1a1040"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- terminal window -->
  <rect x="60" y="56" width="680" height="388" rx="14" fill="#12152e" stroke="#2c3158" stroke-width="1.5"/>
  <rect x="60" y="56" width="680" height="40" rx="14" fill="#1b1f3d"/>
  <rect x="60" y="82" width="680" height="14" fill="#1b1f3d"/>
  <circle cx="88" cy="76" r="6" fill="#ff5f57"/>
  <circle cx="110" cy="76" r="6" fill="#febc2e"/>
  <circle cx="132" cy="76" r="6" fill="#28c840"/>
  <text x="400" y="81" text-anchor="middle" fill="#8890c8" font-size="14">compliance-linter — codex plugin</text>

  <!-- terminal body -->
  <text x="92" y="136" fill="#7dd3fc" font-size="16">$ python -m linter selftest</text>

  <text x="92" y="172" fill="#34d399" font-size="15">PASS</text>
  <text x="150" y="172" fill="#c9cdf0" font-size="15">CHT001  memberHash 누락 (impersonation)</text>

  <text x="92" y="202" fill="#34d399" font-size="15">PASS</text>
  <text x="150" y="202" fill="#c9cdf0" font-size="15">DRIP-FROMPRICE  첫 화면 총액 미표시</text>

  <text x="92" y="232" fill="#34d399" font-size="15">PASS</text>
  <text x="150" y="232" fill="#c9cdf0" font-size="15">CTX-EXOSOME  '식물 엑소좀' 예외 허용</text>

  <text x="92" y="262" fill="#34d399" font-size="15">PASS</text>
  <text x="150" y="262" fill="#c9cdf0" font-size="15">SUB-ABSOLUTE  '재구매율 1위' 실증 요구</text>

  <text x="92" y="298" fill="#a78bfa" font-size="15">41 passed, 0 failed  ·  golden selftest</text>
  <text x="92" y="326" fill="#a78bfa" font-size="15">81 unit tests OK  ·  3 plugins  ·  27 rules</text>

  <!-- diff gate line -->
  <text x="92" y="368" fill="#7dd3fc" font-size="16">$ diff_compliance before after</text>
  <text x="92" y="398" fill="#fbbf24" font-size="15">fixed: 5  remaining: 0  regressed: 0  → PR gate OK</text>

  <!-- caret -->
  <rect x="92" y="412" width="10" height="18" fill="#7dd3fc">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
