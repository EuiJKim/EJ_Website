<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="500" fill="#f7f7f5"/>

  <!-- 왼쪽: 오늘 아젠다 -->
  <rect x="52" y="44" width="330" height="412" rx="18" fill="#ffffff" stroke="#e7e7e3"/>
  <text x="80" y="92" font-size="20" font-weight="800" fill="#191919">7월 15일 수요일</text>
  <rect x="248" y="70" width="54" height="30" rx="15" fill="#191919"/>
  <text x="275" y="91" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">오늘</text>
  <text x="80" y="126" font-size="14.5" fill="#8a8a86">예약 <tspan font-weight="700" fill="#191919">5건</tspan> · 빈 시간 3 · 예상매출 <tspan font-weight="700" fill="#191919">19만</tspan></text>

  <rect x="80" y="148" width="274" height="72" rx="12" fill="#eef4ee"/>
  <text x="98" y="178" font-size="17" font-weight="700" fill="#2c7a4b">10:00 김지현</text>
  <text x="98" y="204" font-size="14" fill="#6f7a72">남성 커트 + 전체다운펌 ✓ 완료</text>

  <rect x="80" y="232" width="274" height="72" rx="12" fill="#ffffff" stroke="#e7e7e3"/>
  <text x="98" y="262" font-size="17" font-weight="700" fill="#191919">11:00 이서준</text>
  <rect x="238" y="244" width="72" height="26" rx="6" fill="#e8f6ee"/>
  <text x="274" y="262" font-size="13" font-weight="700" fill="#03aa5a" text-anchor="middle">N 네이버</text>
  <text x="98" y="288" font-size="14" fill="#8a8a86">아이롱드라이 · 40분</text>

  <rect x="80" y="316" width="274" height="54" rx="12" fill="none" stroke="#d9d9d4" stroke-dasharray="6 5"/>
  <text x="217" y="349" font-size="14" fill="#a0a09a" text-anchor="middle">+ 빈 시간 50분 · 예약 추가</text>

  <rect x="80" y="382" width="274" height="54" rx="12" fill="#ffffff" stroke="#e7e7e3"/>
  <text x="98" y="415" font-size="16" font-weight="700" fill="#191919">13:00 최유나 <tspan font-size="13" font-weight="400" fill="#8a8a86">스캘프 추가</tspan></text>

  <!-- 오른쪽: 빠른 매출 3탭 -->
  <rect x="418" y="44" width="330" height="412" rx="18" fill="#ffffff" stroke="#e7e7e3"/>
  <text x="446" y="92" font-size="20" font-weight="800" fill="#191919">빠른 매출</text>
  <text x="446" y="122" font-size="13.5" fill="#8a8a86">고객 기본 = 손님(비회원) · 결제 기본 = 카드</text>

  <text x="446" y="160" font-size="13" font-weight="700" fill="#8a8a86">자주 쓰는 조합</text>
  <rect x="446" y="172" width="252" height="46" rx="23" fill="#191919"/>
  <text x="572" y="202" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">남자 커트 (−10,000) 15,000원</text>

  <text x="446" y="252" font-size="13" font-weight="700" fill="#8a8a86">시술</text>
  <rect x="446" y="264" width="150" height="42" rx="21" fill="#ffffff" stroke="#dcdcd7"/>
  <text x="521" y="291" font-size="14.5" fill="#3c3c38" text-anchor="middle">남자 커트 25,000</text>
  <rect x="606" y="264" width="114" height="42" rx="21" fill="#ffffff" stroke="#dcdcd7"/>
  <text x="663" y="291" font-size="14.5" fill="#3c3c38" text-anchor="middle">여성 커트 3만</text>

  <!-- 인터랙션 카운터 -->
  <text x="446" y="352" font-size="14" fill="#8a8a86">여기까지 <tspan font-weight="800" fill="#3d6ef7">2번의 탭</tspan> — 저장이 세 번째</text>

  <rect x="446" y="372" width="274" height="56" rx="12" fill="#191919"/>
  <text x="583" y="407" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">15,000원 결제 저장</text>
</svg>
